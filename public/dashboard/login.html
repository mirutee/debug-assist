<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="seu@email.com" required autofocus>
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" id="btn-login">Entrar</button>

        <div style="display:flex;align-items:center;gap:12px;margin:16px 0;">
          <hr style="flex:1;border:none;border-top:1px solid #e5e7eb;">
          <span style="font-size:12px;color:#9ca3af;">ou</span>
          <hr style="flex:1;border:none;border-top:1px solid #e5e7eb;">
        </div>

        <button type="button" id="btn-github" onclick="loginComGithub()"
          style="width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 16px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#24292f;font-size:14px;font-weight:500;cursor:pointer;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#24292f" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/>
          </svg>
          Continuar com GitHub
        </button>

        <div class="error-msg" id="error-msg"></div>
        <div class="success-msg" id="success-msg"></div>
        <p style="margin-top:16px;text-align:center;font-size:12px;color:#555;">
          Não tem conta? <a href="/dashboard/signup.html" style="color:#6366f1;text-decoration:none;">Criar conta</a>
        </p>
      </form>
    </div>
  </div>

  <script>
    const API = '';

    const _params = new URLSearchParams(window.location.search);

    if (localStorage.getItem('debug_assist_token')) {
      const _dest = _params.get('redirect') === 'pricing' ? '/dashboard/pricing.html' : '/dashboard/';
      window.location.replace(_dest);
    }
    if (_params.get('msg') === 'conta-criada') {
      const _banner = document.getElementById('success-msg');
      if (_banner) {
        _banner.textContent = 'Conta criada! Você já pode fazer login.';
        _banner.classList.add('show');
      }
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn-login');
      const errorEl = document.getElementById('error-msg');
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      btn.disabled = true;
      btn.textContent = 'Entrando...';
      errorEl.classList.remove('show');

      try {
        const res = await fetch(`${API}/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha }),
        });
        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.erro || 'Erro ao fazer login.';
          errorEl.classList.add('show');
          return;
        }

        localStorage.setItem('debug_assist_token', data.token);
        const dest = _params.get('redirect') === 'pricing' ? '/dashboard/pricing.html' : '/dashboard/';
        window.location.replace(dest);
      } catch (err) {
        errorEl.textContent = 'Erro de conexão. Tente novamente.';
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });

    const SUPABASE_URL = 'https://wlfjbylsuyjcoyqfhksq.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndsZmpieWxzdXlqY295cWZoa3NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyODAxODcsImV4cCI6MjA4ODg1NjE4N30.gUvsYM3Z66ptaL-I8_EPTokUSqeWfDmjaAY8LEsVqJw';

    function loginComGithub() {
      const redirectParam = new URLSearchParams(window.location.search).get('redirect');
      const callbackUrl = window.location.origin + '/dashboard/auth-callback.html'
        + (redirectParam ? '?redirect=' + encodeURIComponent(redirectParam) : '');

      // Redireciona direto para endpoint OAuth do Supabase — sem SDK necessário
      const oauthUrl = SUPABASE_URL + '/auth/v1/authorize?provider=github&redirect_to='
        + encodeURIComponent(callbackUrl);

      window.location.href = oauthUrl;
    }
  </script>
</body>
</html>
