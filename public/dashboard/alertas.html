<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alertas — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard">
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <a class="nav-item" href="/dashboard/">🏠 Visão Geral</a>
      <a class="nav-item" href="/dashboard/historico.html">📋 Histórico</a>
      <a class="nav-item active" href="/dashboard/alertas.html">🔔 Alertas</a>
      <a class="nav-item" href="https://devinsight-api.onrender.com/docs" target="_blank" rel="noopener">📖 Docs</a>
      <a class="nav-item" id="btn-sair" href="#">🚪 Sair</a>
      <div class="sidebar-footer" id="user-email">Carregando...</div>
    </nav>

    <main class="main">
      <div class="page-title">Alertas Críticos</div>
      <div class="page-subtitle">Diagnósticos de nível alto — ação recomendada</div>

      <div class="error-msg" id="fetch-error" style="margin-bottom:16px;"></div>

      <div class="alert-stats">
        <div class="alert-stat">
          <div class="alert-stat-label">Total carregado</div>
          <div class="alert-stat-value" id="stat-total">—</div>
          <div class="alert-stat-sub">últimos 50 diagnósticos</div>
        </div>
        <div class="alert-stat">
          <div class="alert-stat-label">Últimas 24h</div>
          <div class="alert-stat-value" id="stat-24h">—</div>
          <div class="alert-stat-sub">alertas críticos</div>
        </div>
        <div class="alert-stat">
          <div class="alert-stat-label">Mais recente</div>
          <div class="alert-stat-value" id="stat-recente" style="font-size:16px;margin-top:4px;">—</div>
          <div class="alert-stat-sub" id="stat-recente-tipo">—</div>
        </div>
      </div>

      <div class="history-list" id="alert-list">
        <div class="alert-empty" id="empty-state" style="display:none;">
          Nenhum alerta crítico encontrado. 🎉<br>
          <a href="/dashboard/historico.html">Ver histórico completo →</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = '';
    let mostRecentCriadoEm = null;
    let pollInterval = null;

    async function init() {
      const token = localStorage.getItem('devinsight_token');
      if (!token) {
        window.location.replace('/dashboard/login.html');
        return;
      }

      // Marcar como visto — zera o badge nas outras páginas
      localStorage.setItem('devinsight_last_alert_seen', new Date().toISOString());

      document.getElementById('btn-sair').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('devinsight_token');
        window.location.replace('/dashboard/login.html');
      });

      await loadAlerts(token);
      pollInterval = setInterval(() => poll(token), 5000);
    }

    async function loadAlerts(token) {
      try {
        const res = await fetch(`${API}/v1/diagnosticos/historico`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('devinsight_token');
          window.location.replace('/dashboard/login.html');
          return;
        }

        if (!res.ok) {
          showError('Erro ao carregar alertas. Tente recarregar.');
          return;
        }

        const items = await res.json();
        const altos = items.filter(i => i.resposta && i.resposta.nivel === 'alto');

        renderStats(altos);
        renderItems(altos, false);

        if (altos.length > 0) {
          mostRecentCriadoEm = altos[0].criado_em;
        }

        document.getElementById('user-email').textContent =
          localStorage.getItem('devinsight_email') || '';

        if (altos.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
        }
      } catch (err) {
        showError('Erro de conexão. Verifique sua internet.');
      }
    }

    async function poll(token) {
      if (!mostRecentCriadoEm) return;

      try {
        const res = await fetch(
          `${API}/v1/diagnosticos/historico?after=${encodeURIComponent(mostRecentCriadoEm)}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );

        if (!res.ok) return;

        const items = await res.json();
        const altos = items.filter(i => i.resposta && i.resposta.nivel === 'alto');
        if (altos.length === 0) return;

        renderItems(altos, true);
        mostRecentCriadoEm = altos[0].criado_em;
        document.getElementById('empty-state').style.display = 'none';

        // Atualizar stats após novos itens
        refreshStats();

        // Atualizar last_seen para não mostrar badge nas outras abas
        localStorage.setItem('devinsight_last_alert_seen', new Date().toISOString());
      } catch (_) {}
    }

    function renderStats(altos) {
      const agora = new Date();
      const h24 = new Date(agora.getTime() - 24 * 60 * 60 * 1000);

      document.getElementById('stat-total').textContent = altos.length;
      document.getElementById('stat-24h').textContent =
        altos.filter(i => new Date(i.criado_em) > h24).length;

      if (altos.length > 0) {
        const rec = altos[0];
        document.getElementById('stat-recente').textContent = formatDate(rec.criado_em);
        document.getElementById('stat-recente-tipo').textContent = rec.tipo || '—';
      } else {
        document.getElementById('stat-recente').textContent = 'Nenhum';
        document.getElementById('stat-recente-tipo').textContent = '—';
      }
    }

    function refreshStats() {
      const items = Array.from(document.querySelectorAll('.alert-item')).map(el => ({
        criado_em: el.dataset.criadoEm,
        tipo: el.dataset.tipo,
      }));
      const agora = new Date();
      const h24 = new Date(agora.getTime() - 24 * 60 * 60 * 1000);
      document.getElementById('stat-total').textContent = items.length;
      document.getElementById('stat-24h').textContent =
        items.filter(i => new Date(i.criado_em) > h24).length;
      if (items.length > 0) {
        document.getElementById('stat-recente').textContent = formatDate(items[0].criado_em);
        document.getElementById('stat-recente-tipo').textContent = items[0].tipo || '—';
      }
    }

    function renderItems(items, prepend) {
      const list = document.getElementById('alert-list');
      items.forEach(item => {
        const el = buildItem(item, prepend);
        if (prepend) {
          list.insertBefore(el, list.firstChild);
        } else {
          list.appendChild(el);
        }
      });
    }

    function buildItem(item, isNew) {
      const resposta = item.resposta || {};
      const problema = resposta.problema || '—';
      const causa = resposta.causa || '—';
      const sugestoes = resposta.sugestoes || [];
      const confianca = resposta.confianca != null ? Math.round(resposta.confianca * 100) : null;

      const div = document.createElement('div');
      div.className = 'alert-item history-item' + (isNew ? ' is-new' : '');
      div.dataset.criadoEm = item.criado_em;
      div.dataset.tipo = item.tipo;

      div.innerHTML = `
        <div class="alert-header history-header" onclick="toggleDetail(this)">
          <span class="alert-new-dot"></span>
          <span class="severity-badge nivel-alto">alto</span>
          <span class="alert-tipo history-tipo">${escHtml(item.tipo)}</span>
          <span class="alert-problema history-problema">${escHtml(problema)}</span>
          <span class="alert-time history-time">${formatDate(item.criado_em)}</span>
        </div>
        <div class="history-detail">
          <div class="detail-row"><strong>Causa:</strong> ${escHtml(causa)}</div>
          ${sugestoes.length > 0 ? `
          <div class="detail-row">
            <strong>Sugestões:</strong>
            <ul class="detail-sugestoes">
              ${sugestoes.map(s => `<li>${escHtml(s)}</li>`).join('')}
            </ul>
          </div>` : ''}
          ${confianca != null ? `
          <div class="detail-row">
            <strong>Confiança:</strong> ${confianca}%
            <div class="confianca-bar-wrap">
              <div class="confianca-bar"><div class="confianca-fill" style="width:${confianca}%"></div></div>
            </div>
          </div>` : ''}
          ${item.mensagem ? `<div class="detail-row"><strong>Mensagem:</strong> ${escHtml(item.mensagem)}</div>` : ''}
          ${item.contexto && Object.keys(item.contexto).length > 0 ? `
          <div class="detail-row">
            <strong>Contexto:</strong>
            <pre class="detail-code">${escHtml(JSON.stringify(item.contexto, null, 2))}</pre>
          </div>` : ''}
        </div>
      `;
      return div;
    }

    function toggleDetail(header) {
      header.nextElementSibling.classList.toggle('open');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showError(msg) {
      const el = document.getElementById('fetch-error');
      el.textContent = msg;
      el.classList.add('show');
    }

    init();
  </script>
</body>
</html>
