<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('da_theme');
        var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', saved || sys);
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div class="dashboard">
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <a class="nav-item active">🏠 Visão Geral</a>
      <a class="nav-item" href="/dashboard/historico.html">📋 Histórico</a>
      <a class="nav-item" href="/dashboard/alertas.html" id="nav-alertas">🔔 Alertas<span class="nav-badge" id="alert-badge"></span></a>
      <a class="nav-item" href="/dashboard/configuracoes.html">⚙️ Configurações</a>
      <a class="nav-item" href="https://debug-assist.onrender.com/docs" target="_blank" rel="noopener">📖 Docs</a>
      <a class="nav-item" id="btn-sair" href="#">🚪 Sair</a>
      <div class="sidebar-footer" id="user-email">Carregando...</div>
      <button id="theme-toggle" class="theme-toggle-sidebar" onclick="toggleTheme()" title="Mudar tema"></button>
    </nav>

    <main class="main">
      <div class="page-title">Visão Geral</div>
      <div class="page-subtitle" id="user-subtitle">Carregando...</div>

      <div id="success-upgrade" class="success-upgrade"></div>
      <div id="uso-banner" class="uso-banner" style="display:none"></div>

      <div class="cards-grid">
        <div class="card">
          <div class="card-label">Uso este mês</div>
          <div>
            <span class="usage-number" id="uso">—</span>
            <span class="usage-limit"> / <span id="limite">—</span></span>
          </div>
          <div class="usage-bar">
            <div class="usage-fill" id="usage-fill" style="width: 0%"></div>
          </div>
          <div class="card-sub" id="reset-info">Carregando...</div>
        </div>

        <div class="card">
          <div class="card-label">Plano atual</div>
          <div class="plan-badge" id="plano-nome">—</div>
          <div class="card-sub" id="plano-limite">—</div>
          <a class="btn-upgrade" id="btn-upgrade" href="/dashboard/pricing.html">Fazer upgrade →</a>
          <button class="btn-sm" id="btn-portal" style="display:none;">Gerenciar assinatura</button>
          <div class="error-msg" id="portal-error"></div>
        </div>
      </div>

      <div class="card">
        <div class="card-label" style="margin-bottom: 12px;">Sua API Key</div>
        <div class="apikey-row">
          <div class="apikey-field" id="apikey-field">••••••••-••••-••••-••••-••••••••••••</div>
          <button class="btn-sm" id="btn-reveal" onclick="toggleReveal()">👁 Revelar</button>
          <button class="btn-sm" onclick="copyKey()">📋 Copiar</button>
        </div>
        <div class="copied-feedback" id="copied-feedback">✓ Copiado para a área de transferência!</div>
      </div>
    </main>
  </div>

  <script>
    const API = '';
    let userData = null;
    let revealed = false;

    async function loadDashboard() {
      const token = localStorage.getItem('debug_assist_token');
      if (!token) {
        window.location.replace('/dashboard/login.html');
        return;
      }

      try {
        const res = await fetch(`${API}/v1/auth/me`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          console.error('Token inválido ou expirado — redirecionando para login');
          localStorage.removeItem('debug_assist_token');
          window.location.replace('/dashboard/login.html');
          return;
        }

        if (res.status === 404) {
          document.getElementById('user-subtitle').textContent =
            'Conta não configurada. Entre em contato com o suporte.';
          return;
        }

        if (!res.ok) {
          document.getElementById('user-subtitle').textContent =
            'Erro de conexão. Recarregue a página.';
          return;
        }

        userData = await res.json();
        render(userData);
      } catch (err) {
        document.getElementById('user-subtitle').textContent =
          'Erro de conexão. Verifique sua internet.';
      }
    }

    function render(data) {
      document.getElementById('user-email').textContent = data.email;
      document.getElementById('user-subtitle').textContent =
        data.email + ' · Plano ' + capitalize(data.plano);

      document.getElementById('uso').textContent = data.uso_mensal;

      if (data.limite_mensal === -1) {
        document.getElementById('limite').textContent = '∞';
        document.getElementById('usage-fill').style.width = '5%';
        document.getElementById('reset-info').textContent = 'Uso ilimitado';
      } else {
        document.getElementById('limite').textContent = data.limite_mensal;
        const pct = Math.min(100, Math.round((data.uso_mensal / data.limite_mensal) * 100));
        document.getElementById('usage-fill').style.width = pct + '%';
        document.getElementById('reset-info').textContent =
          'Reset em ' + diasAteReset() + ' dias (00:00 UTC do dia 1°)';
      }

      document.getElementById('plano-nome').textContent = capitalize(data.plano);
      document.getElementById('plano-limite').textContent =
        data.limite_mensal === -1 ? 'Ilimitado' : data.limite_mensal + ' req/mês';

      // Mostrar/ocultar botões conforme plano
      const btnUpgrade = document.getElementById('btn-upgrade');
      const btnPortal = document.getElementById('btn-portal');
      if (data.plano !== 'free') {
        btnUpgrade.style.display = 'none';
        btnPortal.style.display = 'block';
      } else {
        btnUpgrade.style.display = '';
        btnPortal.style.display = 'none';
      }

      // Banner de sucesso de upgrade
      const upgradeParams = new URLSearchParams(window.location.search);
      if (upgradeParams.get('upgrade') === 'sucesso') {
        const banner = document.getElementById('success-upgrade');
        banner.textContent = 'Plano ativado com sucesso! Bem-vindo ao novo plano.';
        banner.style.display = 'block';
        window.history.replaceState({}, '', '/dashboard/');
      }

      // Banner de uso mensal
      const usoBanner = document.getElementById('uso-banner');
      if (usoBanner && data.limite_mensal > 0) {
        const pct = data.uso_mensal / data.limite_mensal;
        usoBanner.textContent = `${data.uso_mensal} de ${data.limite_mensal} diagnósticos usados este mês.`;
        if (pct >= 1) {
          usoBanner.className = 'uso-banner danger';
          usoBanner.innerHTML += ' <a href="/dashboard/pricing.html">Faça upgrade agora →</a>';
        } else if (pct >= 0.8) {
          usoBanner.className = 'uso-banner warning';
          usoBanner.innerHTML += ' <a href="/dashboard/pricing.html">Fazer upgrade →</a>';
        }
        usoBanner.style.display = 'block';
      }
    }

    function diasAteReset() {
      const hoje = new Date();
      const primeiroDoPróximoMês = new Date(Date.UTC(
        hoje.getUTCMonth() === 11 ? hoje.getUTCFullYear() + 1 : hoje.getUTCFullYear(),
        hoje.getUTCMonth() === 11 ? 0 : hoje.getUTCMonth() + 1,
        1
      ));
      return Math.ceil((primeiroDoPróximoMês - hoje) / (1000 * 60 * 60 * 24));
    }

    function capitalize(str) {
      return str ? str.charAt(0).toUpperCase() + str.slice(1) : '';
    }

    function toggleReveal() {
      if (!userData) return;
      revealed = !revealed;
      document.getElementById('apikey-field').textContent = revealed
        ? userData.api_key
        : '••••••••-••••-••••-••••-••••••••••••';
      document.getElementById('btn-reveal').textContent = revealed ? '🙈 Ocultar' : '👁 Revelar';
    }

    function copyKey() {
      if (!userData) return;
      navigator.clipboard.writeText(userData.api_key).then(() => {
        const el = document.getElementById('copied-feedback');
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2000);
      });
    }

    document.getElementById('btn-sair').addEventListener('click', (e) => {
      e.preventDefault();
      localStorage.removeItem('debug_assist_token');
      window.location.replace('/dashboard/login.html');
    });

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('da_theme', next); } catch(e) {}
      updateThemeIcon();
    }
    function updateThemeIcon() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? '☀️' : '🌙';
      btn.title = isDark ? 'Mudar para modo claro' : 'Mudar para modo escuro';
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcon);

    loadDashboard();
    checkAlertBadge();

    async function checkAlertBadge() {
      try {
        const token = localStorage.getItem('debug_assist_token');
        if (!token) return;
        const res = await fetch(`${API}/v1/diagnosticos/historico`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) return;
        const items = await res.json();
        const lastSeen = localStorage.getItem('debug_assist_last_alert_seen') || '1970-01-01T00:00:00Z';
        const count = items.filter(i => i.resposta && i.resposta.nivel === 'alto' && i.criado_em > lastSeen).length;
        if (count > 0) {
          const badge = document.getElementById('alert-badge');
          badge.textContent = count > 9 ? '9+' : count;
          badge.classList.add('visible');
        }
      } catch (_) {}
    }

    document.getElementById('btn-portal').addEventListener('click', async () => {
      const token = localStorage.getItem('debug_assist_token');
      const errorEl = document.getElementById('portal-error');
      errorEl.classList.remove('show');

      if (!token) {
        window.location.replace('/dashboard/login.html');
        return;
      }

      const btn = document.getElementById('btn-portal');
      btn.disabled = true;
      try {
        const res = await fetch(`${API}/v1/billing/portal`, {
          method: 'POST',
          headers: { Authorization: `Bearer ${token}` },
        });
        let data = {};
        try { data = await res.json(); } catch (_) {}

        if (!res.ok) {
          errorEl.textContent = data.erro || 'Erro ao abrir portal.';
          errorEl.classList.add('show');
          return;
        }

        window.location.href = data.url;
      } catch (err) {
        errorEl.textContent = 'Erro de conexão. Tente novamente.';
        errorEl.classList.add('show');
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
