<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
  <script>
    (function() {
      try {
        var saved = localStorage.getItem('da_theme');
        var sys = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', saved || sys);
      } catch(e) {}
    })();
  </script>
</head>
<body>
  <div class="dashboard">
    <nav class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <a class="nav-item" href="/dashboard/">🏠 Visão Geral</a>
      <a class="nav-item active" href="/dashboard/historico.html">📋 Histórico</a>
      <a class="nav-item" href="/dashboard/alertas.html" id="nav-alertas">🔔 Alertas<span class="nav-badge" id="alert-badge"></span></a>
      <a class="nav-item" href="/dashboard/configuracoes.html">⚙️ Configurações</a>
      <a class="nav-item" href="https://debugassist.com.br/docs" target="_blank" rel="noopener">📖 Docs</a>
      <a class="nav-item" id="btn-sair" href="#">🚪 Sair</a>
      <div class="sidebar-footer" id="user-email">Carregando...</div>
      <button id="theme-toggle" class="theme-toggle-sidebar" onclick="toggleTheme()" title="Mudar tema"></button>
      <div class="api-status" id="api-status">
        <span class="api-status-dot"></span>
        <span id="api-status-label">API</span>
      </div>
    </nav>

    <main class="main">
      <div class="page-title">Histórico de Diagnósticos</div>
      <div id="uso-banner" class="uso-banner" style="display:none"></div>
      <div class="page-subtitle" id="page-subtitle">Erros capturados automaticamente pelo SDK e via API</div>

      <div class="error-msg" id="fetch-error" style="margin-bottom:16px;"></div>

      <div class="history-list" id="history-list">
        <div class="history-empty" id="empty-state" style="display:none;">
          Nenhum diagnóstico ainda.<br>
          <a href="https://debugassist.com.br/docs" target="_blank">Integre o SDK no seu projeto →</a>
        </div>
      </div>
    </main>
  </div>

  <script>
    const API = '';
    let mostRecentCriadoEm = null;
    let pollInterval = null;

    async function init() {
      const token = localStorage.getItem('debug_assist_token');
      if (!token) {
        window.location.replace('/dashboard/login.html');
        return;
      }

      document.getElementById('btn-sair').addEventListener('click', (e) => {
        e.preventDefault();
        localStorage.removeItem('debug_assist_token');
        window.location.replace('/dashboard/login.html');
      });

      initBanner(token);
      checkApiStatus();
      await loadHistory(token);
      pollInterval = setInterval(() => poll(token), 5000);
    }

    async function loadHistory(token) {
      try {
        const res = await fetch(`${API}/v1/diagnosticos/historico`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          localStorage.removeItem('debug_assist_token');
          window.location.replace('/dashboard/login.html');
          return;
        }

        if (!res.ok) {
          showError('Erro ao carregar histórico. Tente recarregar.');
          return;
        }

        const items = await res.json();
        renderItems(items, false);

        mostRecentCriadoEm = items.length > 0
          ? items[0].criado_em
          : new Date().toISOString();

        document.getElementById('user-email').textContent =
          localStorage.getItem('debug_assist_email') || '';

        if (items.length === 0) {
          document.getElementById('empty-state').style.display = 'block';
        }
      } catch (err) {
        showError('Erro de conexão. Verifique sua internet.');
      }
    }

    async function poll(token) {
      if (!mostRecentCriadoEm) return;

      try {
        const res = await fetch(
          `${API}/v1/diagnosticos/historico?after=${encodeURIComponent(mostRecentCriadoEm)}`,
          { headers: { Authorization: `Bearer ${token}` } }
        );

        if (!res.ok) return;

        const items = await res.json();
        if (items.length === 0) return;

        renderItems(items, true);
        mostRecentCriadoEm = items[0].criado_em;

        document.getElementById('empty-state').style.display = 'none';
      } catch (err) {
        // Silent — retry on next interval
      }
    }

    function renderItems(items, prepend) {
      const list = document.getElementById('history-list');
      const emptyState = document.getElementById('empty-state');

      items.forEach(item => {
        const el = buildItem(item);
        if (prepend) {
          list.insertBefore(el, list.firstChild);
        } else {
          list.appendChild(el);
        }
      });
    }

    function buildItem(item) {
      const resposta = item.resposta || {};
      const nivel = resposta.nivel || 'baixo';
      const problema = resposta.problema || '—';
      const causa = resposta.causa || '—';
      const sugestoes = resposta.sugestoes || [];
      const confianca = resposta.confianca != null ? Math.round(resposta.confianca * 100) : null;

      const div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <div class="history-header" onclick="toggleDetail(this)">
          <span class="severity-badge nivel-${nivel}">${escHtml(nivel)}</span>
          <span class="history-tipo">${escHtml(item.tipo)}</span>
          <span class="history-problema">${escHtml(problema)}</span>
          <span class="history-time">${formatDate(item.criado_em)}</span>
        </div>
        <div class="history-detail">
          <div class="detail-row"><strong>Causa:</strong> ${escHtml(causa)}</div>
          ${sugestoes.length > 0 ? `
          <div class="detail-row">
            <strong>Sugestões:</strong>
            <ul class="detail-sugestoes">
              ${sugestoes.map(s => `<li style="display:flex;align-items:flex-start;gap:8px;justify-content:space-between"><span>${escHtml(s)}</span><button onclick="copiarTexto(this, ${JSON.stringify(s)})" title="Copiar sugestão" style="flex-shrink:0;background:none;border:none;cursor:pointer;color:#555;font-size:14px;padding:2px 4px;border-radius:4px;transition:color 0.2s">&#10697;</button></li>`).join('')}
            </ul>
          </div>` : ''}
          ${confianca != null ? `
          <div class="detail-row">
            <strong>Confiança:</strong> ${confianca}%
            <div class="confianca-bar-wrap">
              <div class="confianca-bar"><div class="confianca-fill" style="width:${confianca}%"></div></div>
            </div>
          </div>` : ''}
          ${item.mensagem ? `<div class="detail-row"><strong>Mensagem:</strong> ${escHtml(item.mensagem)}</div>` : ''}
          ${item.contexto && Object.keys(item.contexto).length > 0 ? `
          <div class="detail-row">
            <strong>Contexto:</strong>
            <pre class="detail-code">${escHtml(JSON.stringify(item.contexto, null, 2))}</pre>
          </div>` : ''}
        </div>
      `;
      return div;
    }

    function toggleDetail(header) {
      const detail = header.nextElementSibling;
      detail.classList.toggle('open');
    }

    function formatDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function escHtml(str) {
      if (typeof str !== 'string') return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function showError(msg) {
      const el = document.getElementById('fetch-error');
      el.textContent = msg;
      el.classList.add('show');
    }

    function copiarTexto(btn, texto) {
      navigator.clipboard.writeText(texto).then(() => {
        btn.innerHTML = '✓';
        btn.style.color = '#6366f1';
        setTimeout(() => { btn.innerHTML = '&#10697;'; btn.style.color = '#555'; }, 2000);
      });
    }

    function toggleTheme() {
      var current = document.documentElement.getAttribute('data-theme') || 'dark';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('da_theme', next); } catch(e) {}
      updateThemeIcon();
    }
    function updateThemeIcon() {
      var btn = document.getElementById('theme-toggle');
      if (!btn) return;
      var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      btn.textContent = isDark ? '☀️' : '🌙';
      btn.title = isDark ? 'Mudar para modo claro' : 'Mudar para modo escuro';
    }
    document.addEventListener('DOMContentLoaded', updateThemeIcon);

    init();
    checkAlertBadge();

    async function checkAlertBadge() {
      try {
        const token = localStorage.getItem('debug_assist_token');
        if (!token) return;
        const res = await fetch(`${API}/v1/diagnosticos/historico`, {
          headers: { Authorization: `Bearer ${token}` },
        });
        if (!res.ok) return;
        const items = await res.json();
        const lastSeen = localStorage.getItem('debug_assist_last_alert_seen') || '1970-01-01T00:00:00Z';
        const count = items.filter(i => i.resposta && i.resposta.nivel === 'alto' && i.criado_em > lastSeen).length;
        if (count > 0) {
          const badge = document.getElementById('alert-badge');
          badge.textContent = count > 9 ? '9+' : count;
          badge.classList.add('visible');
        }
      } catch (_) {}
    }

    async function initBanner(token) {
      try {
        const res = await fetch(`${API}/v1/auth/me`, { headers: { Authorization: `Bearer ${token}` } });
        if (!res.ok) return;
        const data = await res.json();
        mostrarUsoBanner(data);
      } catch (_) {}
    }

    function mostrarUsoBanner(data) {
      const banner = document.getElementById('uso-banner');
      if (!banner || data.limite_mensal <= 0) return;
      const pct = data.uso_mensal / data.limite_mensal;
      if (pct < 0.8) return;
      banner.textContent = `${data.uso_mensal} de ${data.limite_mensal} diagnósticos usados este mês. `;
      if (pct >= 1) {
        banner.className = 'uso-banner danger';
        banner.innerHTML += '<a href="/dashboard/pricing.html">Faça upgrade agora →</a>';
      } else {
        banner.className = 'uso-banner warning';
        banner.innerHTML += '<a href="/dashboard/pricing.html">Fazer upgrade →</a>';
      }
      banner.style.display = 'block';
    }

    async function checkApiStatus() {
      const el = document.getElementById('api-status');
      const label = document.getElementById('api-status-label');
      try {
        const res = await fetch(`${API}/v1/health`);
        if (res.ok) {
          el.className = 'api-status online';
          label.textContent = 'Online';
        } else {
          el.className = 'api-status offline';
          label.textContent = 'Offline';
        }
      } catch (_) {
        el.className = 'api-status offline';
        label.textContent = 'Offline';
      }
    }
  </script>

  <!-- Feedback flutuante -->
  <button id="feedback-btn"
    onclick="document.getElementById('feedback-modal').style.display='flex'"
    style="position:fixed;bottom:24px;right:24px;background:#6366f1;color:#fff;border:none;border-radius:50px;padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,0.4);z-index:999;display:flex;align-items:center;gap:6px">
    &#9993; Feedback
  </button>

  <div id="feedback-modal" class="feedback-modal-overlay">
    <div class="feedback-modal-box">
      <h3>Enviar Feedback</h3>
      <p>Sua mensagem será enviada para nossa equipe.</p>
      <textarea id="feedback-texto" rows="5" placeholder="Escreva sua mensagem..." class="feedback-textarea"></textarea>
      <div id="feedback-msg" style="font-size:12px;color:#888;margin-top:6px;min-height:16px"></div>
      <div style="display:flex;gap:8px;margin-top:14px;justify-content:flex-end">
        <button onclick="document.getElementById('feedback-modal').style.display='none'" class="feedback-cancel-btn">
          Cancelar
        </button>
        <button onclick="enviarFeedback()"
          style="background:#6366f1;color:#fff;border:none;padding:8px 16px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer">
          Enviar
        </button>
      </div>
    </div>
  </div>

  <script>
  async function enviarFeedback() {
    const texto = document.getElementById('feedback-texto').value.trim();
    const msg = document.getElementById('feedback-msg');
    if (!texto) { msg.textContent = 'Escreva uma mensagem antes de enviar.'; msg.style.color = '#f87171'; return; }
    const token = localStorage.getItem('debug_assist_token') || localStorage.getItem('da_token');
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = 'Bearer ' + token;
    try {
      const res = await fetch('/v1/feedback', { method: 'POST', headers, body: JSON.stringify({ mensagem: texto }) });
      if (res.ok) {
        msg.textContent = 'Obrigado pelo feedback!';
        msg.style.color = '#4ade80';
        document.getElementById('feedback-texto').value = '';
        setTimeout(() => { document.getElementById('feedback-modal').style.display = 'none'; msg.textContent = ''; }, 2000);
      } else {
        msg.textContent = 'Erro ao enviar. Tente novamente.';
        msg.style.color = '#f87171';
      }
    } catch { msg.textContent = 'Erro de conexão.'; msg.style.color = '#f87171'; }
  }
  </script>
</body>
</html>
