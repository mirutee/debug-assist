<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrando... — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <p id="status" style="text-align:center;color:var(--muted, #555);font-size:14px;margin-top:16px;">
        Concluindo login com GitHub...
      </p>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script>
    function showError(msg) {
      document.getElementById('status').style.display = 'none';
      const el = document.getElementById('error-msg');
      el.innerHTML = msg + ' <a href="/dashboard/login.html" style="color:#6366f1">Voltar ao login</a>';
      el.classList.add('show');
    }

    function handleCallback() {
      // Supabase retorna tokens no hash fragment após OAuth (implicit flow)
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const query = new URLSearchParams(window.location.search);

      // Verificar erros
      const errorDesc = hash.get('error_description') || query.get('error_description');
      const errorCode = hash.get('error') || query.get('error');
      if (errorDesc || errorCode) {
        showError('Erro: ' + (errorDesc || errorCode));
        return;
      }

      // Extrair access_token do hash (implicit flow)
      const accessToken = hash.get('access_token');
      if (accessToken) {
        localStorage.setItem('debug_assist_token', accessToken);
        const redirectParam = query.get('redirect');
        const dest = redirectParam === 'pricing' ? '/dashboard/pricing.html' : '/dashboard/';
        // Pausa para o trigger do banco criar o registro do usuário
        setTimeout(() => window.location.replace(dest), 800);
        return;
      }

      // Fallback: verificar se chegou ?code= (PKCE) — não suportado neste fluxo
      if (query.get('code')) {
        showError('Fluxo PKCE não suportado. Tente novamente.');
        return;
      }

      showError('Nenhum token recebido. Tente fazer login novamente.');
    }

    handleCallback();
  </script>
</body>
</html>
