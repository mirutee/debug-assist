<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrando... — DEBUG_Assist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <div class="logo-dot"></div>
        <span class="logo-text">DEBUG_Assist</span>
      </div>
      <p id="status" style="text-align:center;color:var(--muted, #555);font-size:14px;margin-top:16px;">
        Concluindo login com GitHub...
      </p>
      <div class="error-msg" id="error-msg"></div>
    </div>
  </div>

  <script>
    // SEGURANÇA: escapa texto antes de inserir no DOM — evita XSS via parâmetros da URL
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function showError(msg) {
      document.getElementById('status').style.display = 'none';
      const el = document.getElementById('error-msg');
      // SEGURANÇA: textContent para a mensagem de erro (sem XSS),
      // link de volta adicionado como elemento separado
      el.textContent = msg;
      const link = document.createElement('a');
      link.href = '/dashboard/login.html';
      link.style.color = '#6366f1';
      link.textContent = ' Voltar ao login';
      el.appendChild(link);
      el.classList.add('show');
    }

    // Tenta /v1/auth/me até o registro do usuário existir (máx 8s)
    async function waitForUserRecord(token) {
      const MAX_ATTEMPTS = 8;
      const INTERVAL_MS = 1000;
      for (let i = 0; i < MAX_ATTEMPTS; i++) {
        try {
          const res = await fetch('/v1/auth/me', {
            headers: { Authorization: 'Bearer ' + token }
          });
          if (res.ok) return; // registro existe, pode redirecionar
          if (res.status === 401 && i < MAX_ATTEMPTS - 1) {
            // registro ainda não criado — aguarda e tenta novamente
            await new Promise(r => setTimeout(r, INTERVAL_MS));
            continue;
          }
        } catch (_) {
          // erro de rede — aguarda e tenta novamente
          await new Promise(r => setTimeout(r, INTERVAL_MS));
        }
      }
      // esgotou tentativas — redireciona mesmo assim (dashboard fará retry próprio)
    }

    async function handleCallback() {
      // Supabase retorna tokens no hash fragment após OAuth (implicit flow)
      const hash = new URLSearchParams(window.location.hash.slice(1));
      const query = new URLSearchParams(window.location.search);

      // SEGURANÇA [CRÍTICO]: limpar hash imediatamente após leitura —
      // evita que access_token fique exposto na URL durante o redirecionamento
      if (window.location.hash) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }

      // Verificar erros — escapeHtml previne XSS caso error_description seja malicioso
      const errorDesc = hash.get('error_description') || query.get('error_description');
      const errorCode = hash.get('error') || query.get('error');
      if (errorDesc || errorCode) {
        showError('Erro: ' + escapeHtml(errorDesc || errorCode));
        return;
      }

      // Extrair access_token do hash (implicit flow)
      const accessToken = hash.get('access_token');
      if (accessToken) {
        localStorage.setItem('debug_assist_token', accessToken);
        const redirectParam = query.get('redirect');
        const dest = redirectParam === 'pricing' ? '/dashboard/pricing.html' : '/dashboard/';
        // Polling: aguarda o trigger do banco criar o registro antes de redirecionar
        await waitForUserRecord(accessToken);
        window.location.replace(dest);
        return;
      }

      // Fallback: verificar se chegou ?code= (PKCE) — não suportado neste fluxo
      if (query.get('code')) {
        showError('Fluxo PKCE não suportado. Tente novamente.');
        return;
      }

      showError('Nenhum token recebido. Tente fazer login novamente.');
    }

    handleCallback().catch(() => showError('Erro inesperado. Tente fazer login novamente.'));
  </script>
</body>
</html>
